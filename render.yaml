# Render Blueprint specification for Mern-Pingup
# Reference: https://render.com/docs/blueprints
services:
  - type: web
    name: mern-pingup
    env: node
    plan: free # Use Render's free tier
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # Render will prompt you for this value during deployment
